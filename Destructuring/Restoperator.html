<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest operator(...)</title>
    <script>
        /*
        Le rest operator regroupe le « reste » des éléments dans une variable. 
        Il s'utilise dans le destructuring ou pour accepter un nombre variable d'arguments de fonction.
        */

       // Destructuring : récupérer le reste d'un tableau
     const nombres = [1, 2, 3, 4, 5];
     const [premier, ...autres] = nombres;
     console.log(premier); // 1
     console.log(autres); // [2, 3, 4, 5]
       
     // Destructuring : récupérer le reste d'un objet
     const { nom, ...restant } = { nom: "Alice", age: 30, ville: "Paris" };
     console.log(restant); // { age: 30, ville: "Paris" }

     // Fonction avec un nombre variable d'arguments
     function additionner(...nombres) {
        return nombres.reduce((acc, n) => acc + n, 0);
     }
       console.log(additionner(1, 2, 3, 4)); // 10

    </script>
</head>
<body>
    
</body>
</html>
