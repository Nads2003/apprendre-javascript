<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Fonctions usuelles</title>
    <script>
        // Fonctions usuelles : Créer un tableau de nombres et utiliser les méthodes forEach, filter, map, reduce et find pour effectuer différentes opérations sur le tableau. Afficher les résultats dans la console.

        // Fonctions usuelles forEach : Créer un tableau de notes d'étudiants et utiliser la méthode forEach pour afficher chaque note dans la console. Ajouter une fonction qui calcule la moyenne des notes et l'affiche également dans la console.
        const notes = [12, 15, 8, 10, 18, 20];
        notes.forEach((note, index) => {
            console.log(`Note ${index + 1}: ${note}`);
        });

        //Fonction usuelle filtre : Créer une fonction qui prend un tableau de notes et retourne un nouveau tableau contenant uniquement les notes supérieures ou égales à 10. Utiliser la méthode filter pour réaliser cette tâche.
        notes.filter(note => note >= 10) 
        console.log(`Notes supérieures ou égales à 10 : ${notes.filter(note => note >= 10)}`);
       
        
        //Fonction usuelle map : Créer une fonction qui prend un tableau de notes et retourne un nouveau tableau contenant les notes multipliées par 2. Utiliser la méthode map pour réaliser cette tâche.
       const persons = [
        {fistname:'john', last:'doe'},
        {fistname:'Jane', last:'doe'},
        {fistname:'Marc', last:'doe'},
        {fistname:'john', last:'doe'},
       {fistname:'Manou', last:'doe'}
    ]
        notes.map(note => note * 2)
        console.log(`Notes multipliées par 2 : ${notes.map(note => note * 2)}`);
        console.log(persons
        .map((p) => p.fistname + '' + p.last)
        .join('\n')
    )
        //Fonction usuelle reduce : Créer une fonction qui prend un tableau de notes et retourne la somme de toutes les notes. Utiliser la méthode reduce pour réaliser cette tâche.
        const somme = notes.reduce((acc, note) => acc + note, 0);
        console.log(`Somme des notes : ${somme}`);
      
        //Fonction usuelle find : Créer une fonction qui prend un tableau de notes et retourne la première note supérieure à 15. Utiliser la méthode find pour réaliser cette tâche.
        const noteSuperieureA15 = notes.find(note => note > 15);
        console.log(`Première note supérieure à 15 : ${noteSuperieureA15}`);
        
        //Fonction usuelle includes : Créer une fonction qui prend un tableau de notes et retourne true si le tableau contient la note 10, sinon retourne false. Utiliser la méthode includes pour réaliser cette tâche.
        const pets = [
            { name: 'Max', type: 'dog' },
            { name: 'Mittens', type: 'cat' },
            { name: 'Buddy', type: 'dog' },
            { name: 'Whiskers', type: 'cat' }
        ];
        console.log(pets.includes({ name: 'Max', type: 'dog' })); // false
        console.log(pets.some(pet => pet.name === 'Max' && pet.type === 'dog')); // true
        
        //Trouve index un eement dans le tableau
        const beats = ['ant','bison','camel','duck','bison'];
        console.log(beats.indexOf('bison'));
        console.log(beats.indexOf('ant'))

        const elements =['fire','air','water'];
        console.log(elements.join());
        console.log(elements.join(''));
        console.log(elements.join('-'));

        console.log(animals);
        animals.push('chicken','pigeon','aigle');
        console.log(animals )

        const animaux = [

        ]
        console.log(animals.slice(1));
